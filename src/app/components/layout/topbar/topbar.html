<div class="h-16 bg-card border-b border-border flex items-center justify-between px-6 sticky top-0 z-10">
  <div class="flex items-center gap-4 flex-1 max-w-2xl">
    @if (router.url.includes('/catalog')) {
    <div class="relative flex-1">
      <lucide-icon [img]="SearchIcon" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-muted-foreground"></lucide-icon>
      <input
        type="text"
        placeholder="Buscar por título o autor..."
        [value]="store.searchQuery()"
        (input)="onSearchChange($event)"
        class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 pl-10"
      />
    </div>
    }
  </div>

  <div class="flex items-center gap-2">
    <button
      (click)="store.toggleTheme()"
      class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 hover:bg-accent hover:text-accent-foreground h-10 w-10"
    >
      @if (store.theme() === 'dark') {
        <lucide-icon [img]="SunIcon" class="h-5 w-5"></lucide-icon>
      } @else {
        <lucide-icon [img]="MoonIcon" class="h-5 w-5"></lucide-icon>
      }
    </button>

    <button
      (click)="handleNotifications()"
      class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 hover:bg-accent hover:text-accent-foreground h-10 w-10"
    >
      <lucide-icon [img]="BellIcon" class="h-5 w-5"></lucide-icon>
    </button>

    @if (store.isAuthenticated()) {
    <button
      (click)="handleLogout()"
      class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 hover:bg-accent hover:text-accent-foreground h-10 w-10"
    >
      <lucide-icon [img]="LogOutIcon" class="h-5 w-5"></lucide-icon>
    </button>
    }
  </div>
</div>
