<div class="min-h-screen flex items-center justify-center relative overflow-hidden p-4">
  <div class="absolute inset-0 bg-gradient-to-br from-background via-surface to-primary/10">
    <div class="absolute inset-0 opacity-5">
      <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="wave-pattern-r" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
            <path d="M0 50 Q 25 25, 50 50 T 100 50" stroke="currentColor" stroke-width="0.5" fill="none" class="text-primary"/>
            <path d="M0 60 Q 25 35, 50 60 T 100 60" stroke="currentColor" stroke-width="0.5" fill="none" class="text-secondary"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#wave-pattern-r)" />
      </svg>
    </div>
  </div>

  <div class="w-full max-w-lg relative z-10">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-foreground mb-2">Crear Cuenta</h1>
      <p class="text-muted-foreground">Únete a la Biblioteca Digital LassRiver NS</p>
    </div>

    <div class="rounded-xl border bg-card text-card-foreground shadow">
      <div class="flex flex-col space-y-1.5 p-6">
        <h3 class="font-semibold leading-none tracking-tight">Registro</h3>
        <p class="text-sm text-muted-foreground">Completa todos los campos para crear tu cuenta</p>
      </div>

      <form (submit)="register($event)">
        <div class="p-6 pt-0 space-y-4">
          @if (localError() || store.error()) {
          <div class="bg-destructive/10 text-destructive text-sm p-3 rounded-lg">
            {{ localError() || store.error() }}
          </div>
          }

          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label for="firstName" class="text-sm font-medium">Nombre *</label>
              <input
                id="firstName"
                type="text"
                [ngModel]="firstName()"
                (ngModelChange)="firstName.set($event)"
                name="firstName"
                placeholder="Daniel"
                class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
              />
            </div>
            <div class="space-y-2">
              <label for="lastName" class="text-sm font-medium">Apellido</label>
              <input
                id="lastName"
                type="text"
                [ngModel]="lastName()"
                (ngModelChange)="lastName.set($event)"
                name="lastName"
                placeholder="Lasso"
                class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label for="reg-username" class="text-sm font-medium">Nombre de Usuario *</label>
            <input
              id="reg-username"
              type="text"
              [ngModel]="username()"
              (ngModelChange)="username.set($event)"
              name="username"
              placeholder="daniel.lasso"
              class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
            />
          </div>

          <div class="space-y-2">
            <label for="reg-email" class="text-sm font-medium">Correo Electrónico *</label>
            <input
              id="reg-email"
              type="email"
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              name="email"
              placeholder="correo@ejemplo.com"
              class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label for="fecha-nacimiento" class="text-sm font-medium">Fecha de Nacimiento *</label>
              <input
                id="fecha-nacimiento"
                type="date"
                [ngModel]="fechaNacimiento()"
                (ngModelChange)="fechaNacimiento.set($event)"
                name="fechaNacimiento"
                class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
              />
            </div>
            <div class="space-y-2">
              <label for="genero" class="text-sm font-medium">Género *</label>
              <select
                id="genero"
                [ngModel]="genero()"
                (ngModelChange)="genero.set($event)"
                name="genero"
                class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
              >
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
                <option value="O">Otro</option>
                <option value="N">Prefiero no decirlo</option>
              </select>
            </div>
          </div>

          <div class="space-y-2">
            <label for="pais" class="text-sm font-medium">País *</label>
            <input
              id="pais"
              type="text"
              [ngModel]="pais()"
              (ngModelChange)="pais.set($event)"
              name="pais"
              placeholder="Colombia"
              class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label for="reg-password" class="text-sm font-medium">Contraseña *</label>
              <input
                id="reg-password"
                type="password"
                [ngModel]="password()"
                (ngModelChange)="password.set($event)"
                name="password"
                placeholder="••••••••"
                class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
              />
            </div>
            <div class="space-y-2">
              <label for="confirm-password" class="text-sm font-medium">Confirmar *</label>
              <input
                id="confirm-password"
                type="password"
                [ngModel]="confirmPassword()"
                (ngModelChange)="confirmPassword.set($event)"
                name="confirmPassword"
                placeholder="••••••••"
                class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
              />
            </div>
          </div>
        </div>

        <div class="flex items-center p-6 pt-0 flex-col gap-4">
          <button
            type="submit"
            [disabled]="store.loading()"
            class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 w-full"
          >
            {{ store.loading() ? 'Creando cuenta...' : 'Crear Cuenta' }}
          </button>

          <p class="text-sm text-muted-foreground text-center">
            ¿Ya tienes cuenta?
            <button type="button" (click)="goToLogin()" class="text-primary hover:underline">
              Inicia sesión
            </button>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
