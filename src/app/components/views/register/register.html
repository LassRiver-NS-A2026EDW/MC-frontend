<div class="min-h-screen bg-background flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div
        class="h-16 w-16 rounded-2xl bg-primary flex items-center justify-center text-primary-foreground text-2xl font-bold mx-auto mb-4"
      >
        LR
      </div>
      <h1 class="text-3xl font-bold text-foreground">Crear Cuenta</h1>
      <p class="text-muted-foreground mt-2">Únete a LassRiver NS</p>
    </div>

    <div class="bg-card border border-border rounded-2xl p-8 shadow-lg">
      @if (error()) {
      <div class="bg-destructive/10 text-destructive text-sm p-3 rounded-lg mb-4">
        {{ error() }}
      </div>
      }

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-foreground mb-1.5">Nombre</label>
          <input
            type="text"
            [ngModel]="name()"
            (ngModelChange)="name.set($event)"
            placeholder="Tu nombre"
            class="w-full px-4 py-2.5 rounded-lg border border-input bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-foreground mb-1.5">Email</label>
          <input
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            placeholder="tu@email.com"
            class="w-full px-4 py-2.5 rounded-lg border border-input bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-foreground mb-1.5">Contraseña</label>
          <input
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            placeholder="Mínimo 6 caracteres"
            class="w-full px-4 py-2.5 rounded-lg border border-input bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-foreground mb-1.5"
            >Confirmar Contraseña</label
          >
          <input
            type="password"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            placeholder="Repite la contraseña"
            class="w-full px-4 py-2.5 rounded-lg border border-input bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring"
          />
        </div>
        <button
          (click)="register()"
          class="w-full py-2.5 bg-primary text-primary-foreground rounded-lg font-medium hover:opacity-90 transition-opacity"
        >
          Crear Cuenta
        </button>
      </div>

      <div class="mt-6 text-center">
        <p class="text-sm text-muted-foreground">
          ¿Ya tienes cuenta?
          <a (click)="goToLogin()" class="text-primary hover:underline cursor-pointer"
            >Inicia Sesión</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
