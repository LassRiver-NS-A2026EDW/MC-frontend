@if (isOpen()) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-background/70 backdrop-blur-md animate-fade-in" role="dialog" aria-modal="true">
  <div class="fixed inset-0" (click)="close()" aria-hidden="true"></div>

  <div class="relative bg-card text-card-foreground shadow-2xl rounded-2xl border border-border/60 w-full max-w-sm overflow-hidden animate-scale-in">
    <!-- Cinta superior según severidad -->
    <div [class]="'h-1 ' + (isDestructive() ? 'bg-destructive' : 'gradient-brand')"></div>

    <button
      (click)="close()"
      class="absolute top-4 right-4 h-8 w-8 rounded-lg flex items-center justify-center text-muted-foreground hover:text-foreground hover:bg-muted transition-all focus-ring"
      aria-label="Cerrar"
    >
      <lucide-icon [img]="XIcon" class="h-4 w-4"></lucide-icon>
    </button>

    <div class="flex flex-col space-y-1.5 p-6 pt-8 text-center">
      <div class="mx-auto relative mb-2">
        <div [class]="'absolute inset-0 rounded-2xl blur-xl opacity-40 ' + (isDestructive() ? 'bg-destructive' : 'gradient-brand')"></div>
        <div [class]="'relative w-14 h-14 rounded-2xl flex items-center justify-center ring-1 ' + (isDestructive() ? 'bg-destructive/15 text-destructive ring-destructive/30' : 'bg-primary/15 text-primary ring-primary/20')">
          <lucide-icon [img]="AlertIcon" class="h-7 w-7"></lucide-icon>
        </div>
      </div>
      <h3 class="font-bold tracking-tight text-lg">{{ title() }}</h3>
      <p class="text-sm text-muted-foreground leading-relaxed">
        {{ description() }}
      </p>
    </div>

    <div class="p-6 pt-0 flex flex-col gap-2">
      <button
        (click)="confirm()"
        [class]="isDestructive()
          ? 'inline-flex items-center justify-center gap-2 h-11 w-full rounded-xl font-semibold bg-destructive text-destructive-foreground hover:brightness-110 transition-all shadow-lg shadow-destructive/30 focus-ring'
          : 'btn-primary w-full'"
      >
        {{ confirmText() }}
      </button>
      <button (click)="close()" class="btn-ghost w-full">
        {{ cancelText() }}
      </button>
    </div>
  </div>
</div>
}
