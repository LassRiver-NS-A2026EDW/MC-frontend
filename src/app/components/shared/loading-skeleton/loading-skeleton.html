@if (type() === 'card') {
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    @for (_ of [].constructor(count()); track $index) {
      <div class="bg-card border border-border rounded-xl p-4 animate-pulse">
        <div class="h-48 bg-muted rounded-lg mb-4"></div>
        <div class="h-4 bg-muted rounded w-3/4 mb-2"></div>
        <div class="h-3 bg-muted rounded w-1/2 mb-2"></div>
        <div class="h-3 bg-muted rounded w-1/4"></div>
      </div>
    }
  </div>
} @else if (type() === 'detail') {
  <div class="max-w-4xl mx-auto animate-pulse">
    <div class="flex gap-8">
      <div class="h-96 w-72 bg-muted rounded-lg"></div>
      <div class="flex-1 space-y-4">
        <div class="h-8 bg-muted rounded w-3/4"></div>
        <div class="h-4 bg-muted rounded w-1/2"></div>
        <div class="h-4 bg-muted rounded w-full"></div>
        <div class="h-4 bg-muted rounded w-full"></div>
        <div class="h-4 bg-muted rounded w-2/3"></div>
      </div>
    </div>
  </div>
} @else {
  <div class="animate-pulse space-y-3">
    @for (_ of [].constructor(count()); track $index) {
      <div class="h-14 bg-muted rounded-lg w-full"></div>
    }
  </div>
}
