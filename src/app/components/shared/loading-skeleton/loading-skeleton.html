@if (type() === 'card') {
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" role="status" aria-label="Cargando contenido">
    @for (_ of [].constructor(count()); track $index) {
      <div class="bg-card border border-border rounded-2xl p-4 overflow-hidden">
        <div class="h-48 shimmer-bg rounded-xl mb-4"></div>
        <div class="h-4 shimmer-bg rounded w-3/4 mb-2"></div>
        <div class="h-3 shimmer-bg rounded w-1/2 mb-2"></div>
        <div class="h-3 shimmer-bg rounded w-1/4"></div>
      </div>
    }
  </div>
} @else if (type() === 'detail') {
  <div class="max-w-4xl mx-auto" role="status" aria-label="Cargando detalle">
    <div class="flex flex-col md:flex-row gap-8">
      <div class="h-96 w-72 shimmer-bg rounded-2xl"></div>
      <div class="flex-1 space-y-4">
        <div class="h-8 shimmer-bg rounded-lg w-3/4"></div>
        <div class="h-4 shimmer-bg rounded w-1/2"></div>
        <div class="h-4 shimmer-bg rounded w-full"></div>
        <div class="h-4 shimmer-bg rounded w-full"></div>
        <div class="h-4 shimmer-bg rounded w-2/3"></div>
        <div class="flex gap-3 pt-4">
          <div class="h-10 w-32 shimmer-bg rounded-xl"></div>
          <div class="h-10 w-32 shimmer-bg rounded-xl"></div>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="space-y-3" role="status" aria-label="Cargando">
    @for (_ of [].constructor(count()); track $index) {
      <div class="h-14 shimmer-bg rounded-xl w-full"></div>
    }
  </div>
}
