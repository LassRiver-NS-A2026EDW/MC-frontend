<div class="rounded-xl border border-dashed bg-card text-card-foreground shadow">
  <div class="flex flex-col items-center justify-center py-16 px-6">
    <div class="h-16 w-16 rounded-full bg-primary/10 flex items-center justify-center mb-6">
      <lucide-icon [img]="icon()" class="h-8 w-8 text-primary"></lucide-icon>
    </div>
    <h3 class="text-xl font-semibold mb-2 text-center">{{ title() }}</h3>
    @if (description()) {
      <p class="text-muted-foreground text-center mb-6 max-w-md">{{ description() }}</p>
    }
    @if (actionLabel()) {
      <button (click)="onAction.emit()" class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2">
        {{ actionLabel() }}
      </button>
    }
  </div>
</div>
