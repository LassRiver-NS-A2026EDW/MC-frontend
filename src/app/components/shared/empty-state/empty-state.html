<div class="rounded-2xl border-2 border-dashed border-border bg-card/60 text-card-foreground transition-all hover:border-primary/40">
  <div class="flex flex-col items-center justify-center py-16 px-6 animate-fade-up">
    <div class="relative mb-6">
      <div class="absolute inset-0 gradient-brand rounded-full blur-2xl opacity-20"></div>
      <div class="relative h-20 w-20 rounded-2xl bg-primary/10 ring-1 ring-primary/20 flex items-center justify-center animate-float">
        <lucide-icon [img]="icon()" class="h-9 w-9 text-primary"></lucide-icon>
      </div>
    </div>
    <h3 class="text-xl font-bold mb-2 text-center tracking-tight">{{ title() }}</h3>
    @if (description()) {
      <p class="text-muted-foreground text-center mb-6 max-w-md leading-relaxed">{{ description() }}</p>
    }
    @if (actionLabel()) {
      <button (click)="onAction.emit()" class="btn-primary group">
        <span>{{ actionLabel() }}</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 transition-transform group-hover:translate-x-1">
          <path d="M5 12h14M13 5l7 7-7 7"/>
        </svg>
      </button>
    }
  </div>
</div>
