<div class="flex flex-col items-center justify-center py-16 px-4">
  <div class="text-6xl mb-4">{{ icon() }}</div>
  <h3 class="text-xl font-semibold text-foreground mb-2">{{ title() }}</h3>
  @if (description()) {
    <p class="text-muted-foreground text-center max-w-md mb-6">{{ description() }}</p>
  }
  @if (actionLabel()) {
    <button (click)="onAction.emit()" class="px-6 py-2.5 bg-primary text-primary-foreground rounded-lg hover:opacity-90 transition-opacity font-medium">
      {{ actionLabel() }}
    </button>
  }
</div>
