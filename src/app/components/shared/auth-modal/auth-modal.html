@if (isOpen()) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-background/70 backdrop-blur-md animate-fade-in" role="dialog" aria-modal="true">
  <div class="fixed inset-0" (click)="close()" aria-hidden="true"></div>

  <div class="relative bg-card text-card-foreground shadow-2xl rounded-2xl border border-border/60 w-full max-w-sm overflow-hidden animate-scale-in">
    <!-- Cinta superior gradiente -->
    <div class="h-1 gradient-brand"></div>

    <button
      (click)="close()"
      class="absolute top-4 right-4 h-8 w-8 rounded-lg flex items-center justify-center text-muted-foreground hover:text-foreground hover:bg-muted transition-all focus-ring"
      aria-label="Cerrar"
    >
      <lucide-icon [img]="XIcon" class="h-4 w-4"></lucide-icon>
    </button>

    <div class="flex flex-col space-y-1.5 p-6 pt-8 text-center">
      <div class="mx-auto relative mb-3">
        <div class="absolute inset-0 gradient-brand rounded-2xl blur-xl opacity-40"></div>
        <div class="relative bg-primary/15 w-14 h-14 rounded-2xl flex items-center justify-center text-primary ring-1 ring-primary/20">
          <lucide-icon [img]="LogInIcon" class="h-7 w-7"></lucide-icon>
        </div>
      </div>
      <h3 class="font-bold tracking-tight text-lg">Inicia sesión</h3>
      <p class="text-sm text-muted-foreground leading-relaxed">
        {{ message() }}
      </p>
    </div>

    <div class="p-6 pt-0 flex flex-col gap-2">
      <button (click)="goToLogin()" class="btn-primary w-full">
        <lucide-icon [img]="LogInIcon" class="h-4 w-4"></lucide-icon>
        Ir al Login
      </button>
      <button (click)="close()" class="btn-ghost w-full">
        Cancelar
      </button>
    </div>
  </div>
</div>
}
