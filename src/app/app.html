<div class="h-screen flex bg-background text-foreground overflow-hidden">
  @if (showSidebar) {
  <app-sidebar />
  <div class="flex-1 flex flex-col overflow-hidden">
    <app-topbar />
    <div class="flex-1 overflow-auto">
      <router-outlet />
    </div>
  </div>
  } @else {
  <div class="flex-1 overflow-auto">
    <router-outlet />
  </div>
  }
</div>

<app-auth-modal
  [isOpen]="store.showAuthModal()"
  [message]="store.authModalMessage()"
  (onClose)="store.showAuthModal.set(false)"
></app-auth-modal>

@if (store.confirmModalConfig(); as config) {
  <app-confirm-modal
    [isOpen]="store.showConfirmModal()"
    [title]="config.title"
    [description]="config.description"
    [confirmText]="config.confirmText"
    [cancelText]="config.cancelText"
    [isDestructive]="config.isDestructive"
    (onConfirm)="config.onConfirm()"
    (onClose)="store.showConfirmModal.set(false)"
  ></app-confirm-modal>
}
